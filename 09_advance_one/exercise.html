<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Card Example</title>

<style>

body{
    font-family: Arial, sans-serif;
    background:#f2f4f8;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

/* Card */
.card{
    width:300px;
    background:white;
    border-radius:12px;
    overflow:hidden;
    box-shadow:0 8px 20px rgba(0,0,0,0.15);
    transition:transform 0.3s, box-shadow 0.3s;
}

/* Hover effect */
.card:hover{
    transform:translateY(-8px);
    box-shadow:0 12px 25px rgba(0,0,0,0.25);
}

/* Image */
.card img{
    width:100%;
    height:180px;
    object-fit:cover;
}

/* Content */
.card-content{
    padding:20px;
}

.card-title{
    font-size:20px;
    margin-bottom:10px;
}

.card-text{
    font-size:14px;
    color:#555;
    margin-bottom:15px;
}

/* Button */
.card-btn{
    display:inline-block;
    padding:10px 18px;
    background:#007bff;
    color:white;
    text-decoration:none;
    border-radius:6px;
    transition:background 0.3s;
}

.card-btn:hover{
    background:#0056b3;
}

</style>
</head>

<body>

<div class="card">
    <img src="https://surl.li/tkmdyz" alt="Card Image">
    
    <div class="card-content">
        <h3 class="card-title">Follower Card</h3>
        <p class="card-text">
            Click on the button to reveal image and follower Count
        </p>
        <a href="#" class="card-btn">Click here</a>
    </div>
</div>

</body>

<script>
    const requestUrl = 'https://api.github.com/users/hiteshchoudhary'
    const xhr = new XMLHttpRequest()
    document.querySelector('.card-btn').addEventListener('click', () => {
        xhr.open('GET',requestUrl)
        xhr.send()
    })
    xhr.onreadystatechange = function() {
        if(xhr.readyState === 4) {
            const response = JSON.parse(this.responseText)
            displayImage(response.avatar_url)
            displayFollowerCount(response.followers)
        }
    }

    function displayImage (imageUrl) {
        document.querySelector('img').src = imageUrl
    }

     function displayFollowerCount (followers) {
        document.querySelector('.card-text').innerHTML = `<p>Follower Count: ${followers}</p>`
    }
</script>
</html>
